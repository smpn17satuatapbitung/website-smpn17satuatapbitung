<!DOCTYPE html>
<html>
<head>
<title>Login Admin</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:#1e3a8a;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login Admin</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u=="admin" && p=="smpn17"){

window.location="dashboard.html";

}else{

alert("Username atau password salah");

}

}

</script>

</body>
</html>
