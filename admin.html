<!DOCTYPE html>
<html>
<head>
<title>Login Admin</title>

<style>

body{
font-family:Poppins;
background:#1e3a8a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="smpn17"){
window.location="dashboard.html";
}
else{
document.getElementById("error").innerText="Login gagal";
}

}

</script>

</body>
</html>
