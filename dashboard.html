<!DOCTYPE html>
<html>
<head>
<title>Dashboard Admin</title>

<style>

body{
font-family:Poppins;
background:#f5f7fa;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#1e3a8a;
color:white;
border:none;
cursor:pointer;
}

.card{
background:#f2f2f2;
padding:15px;
margin-top:15px;
border-radius:8px;
}

img{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Tambah Berita / Kegiatan</h2>

<input id="judul" placeholder="Judul kegiatan">

<textarea id="isi" placeholder="Isi berita"></textarea>

<input type="file" id="foto">

<button onclick="simpan()">Simpan</button>

<h2>Daftar Berita</h2>

<div id="list"></div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("kegiatan")) || [];

function tampil(){

let html="";

data.forEach((d,i)=>{

html+=`

<div class="card">

<h3>${d.judul}</h3>

<p>${d.isi}</p>

${d.foto ? `<img src="${d.foto}">` : ""}

<br><br>

<button onclick="hapus(${i})">Hapus</button>

</div>

`;

});

document.getElementById("list").innerHTML=html;

}

function simpan(){

let judul=document.getElementById("judul").value;

let isi=document.getElementById("isi").value;

let file=document.getElementById("foto").files[0];

if(!judul || !isi){

alert("Isi judul dan berita");

return;

}

if(file){

let reader=new FileReader();

reader.onload=function(){

data.push({

judul:judul,

isi:isi,

foto:reader.result

});

localStorage.setItem("kegiatan",JSON.stringify(data));

tampil();

};

reader.readAsDataURL(file);

}else{

data.push({judul:judul,isi:isi});

localStorage.setItem("kegiatan",JSON.stringify(data));

tampil();

}

}

function hapus(i){

data.splice(i,1);

localStorage.setItem("kegiatan",JSON.stringify(data));

tampil();

}

tampil();

</script>

</body>
</html>
